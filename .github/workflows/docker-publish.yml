---
name: Docker Build & Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      statuses: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Lint Code Base
        uses: github/super-linter/slim@v7
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test docker build
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Test
        uses: ./.github/actions/docker-test

  build:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: Get version
        id: getver
        run: |
          v_patch=$(grep "FROM factoriotools/factorio" Dockerfile | awk -F ':' '{print $2}' | tr -d '\r' | xargs)
          v_minor=$(echo "$v_patch" | awk -F '.' '{print $1"."$2}')
          v_major=$(echo "$v_patch" | awk -F '.' '{print $1}')
          {
            echo "v_patch=v$v_patch"
            echo "v_minor=v$v_minor"
            echo "v_major=v$v_major"
            echo "docker_patch=$v_patch"
            echo "docker_minor=$v_minor"
            echo "docker_major=$v_major"
          } >> "$GITHUB_OUTPUT"
      - name: Add patch tag
        if: github.event_name != 'pull_request'
        uses: richardsimko/update-tag@v2
        with:
          tag_name: ${{ steps.getver.outputs.v_patch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Add minor tag
        if: github.event_name != 'pull_request'
        uses: richardsimko/update-tag@v2
        with:
          tag_name: ${{ steps.getver.outputs.v_minor }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Add major tag
        if: github.event_name != 'pull_request'
        uses: richardsimko/update-tag@v2
        with:
          tag_name: ${{ steps.getver.outputs.v_major }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Get current latest image version
        id: latestver
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          image=$(printf '%s' "${REGISTRY}/${IMAGE_NAME}:latest" | tr '[:upper:]' '[:lower:]')
          old_patch=""

          if docker pull "$image"; then
            old_patch=$(docker image inspect "$image" --format '{{ index .Config.Labels "factorio.version" }}' || true)
            old_patch=$(printf '%s' "$old_patch" | tr -d '\r' | xargs)
          fi

          if [ "$old_patch" = "<no value>" ]; then
            old_patch=""
          fi

          changed=false
          if [ -n "$old_patch" ] && [ "$old_patch" != "${{ steps.getver.outputs.docker_patch }}" ]; then
            changed=true
          fi

          {
            echo "image=$image"
            echo "docker_patch=$old_patch"
            echo "changed=$changed"
          } >> "$GITHUB_OUTPUT"
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.getver.outputs.docker_patch }},enable={{is_default_branch}},priority=900
            type=raw,value=${{ steps.getver.outputs.docker_minor }},enable={{is_default_branch}},priority=800
            type=raw,value=${{ steps.getver.outputs.docker_major }},enable={{is_default_branch}},priority=700
            type=raw,value=latest,enable={{is_default_branch}},priority=600
            type=ref,event=branch,priority=500
            type=ref,event=pr
          labels: |
            maintainer=${{ github.server_url }}/${{ github.repository }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Discord notification
        if: github.event_name != 'pull_request' && steps.latestver.outputs.changed == 'true'
        uses: Ilshidur/action-discord@0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: >
            Published ${{ steps.latestver.outputs.image }}:
            Factorio patch version ${{ steps.latestver.outputs.docker_patch }}
            -> ${{ steps.getver.outputs.docker_patch }}.
